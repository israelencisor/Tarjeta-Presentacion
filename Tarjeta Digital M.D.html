<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0a">
<title>M. D. Israel Enciso Rebollo — Enciso Abogados</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #050505;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Montserrat', sans-serif;
    padding: 24px 16px;
  }

  /* ── CARD ── */
  .biz-card {
    width: 100%;
    max-width: 380px;
    background: #0a0a0a;
    border-radius: 20px;
    overflow: hidden;
    border: 0.5px solid #222;
  }

  .card-top-line {
    height: 2px;
    background: linear-gradient(90deg, #7a6020 0%, #b8953a 30%, #e8c96e 50%, #b8953a 70%, #7a6020 100%);
  }

  .card-body {
    padding: 28px 28px 20px;
  }

  /* ── LOGO ── */
  .logo-area {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 24px;
  }

  .logo-mark {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .logo-bars {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .bar {
    background: #b8953a;
    height: 1.5px;
    border-radius: 2px;
  }

  .bar:nth-child(1) { width: 18px; }
  .bar:nth-child(2) { width: 13px; }

  .logo-chevron {
    color: #b8953a;
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-weight: 300;
    line-height: 1;
    margin-top: -2px;
  }

  .logo-divider {
    width: 0.5px;
    height: 30px;
    background: #2a2a2a;
  }

  .logo-text-group {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .firm-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    font-weight: 500;
    color: #e8e0d0;
    letter-spacing: 0.02em;
    line-height: 1.2;
  }

  .firm-sub {
    font-size: 8px;
    font-weight: 400;
    color: #666;
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }

  /* ── NAME ── */
  .separator-line {
    width: 100%;
    height: 0.5px;
    background: #1e1e1e;
    margin-bottom: 20px;
  }

  .contact-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-weight: 400;
    color: #e8e0d0;
    letter-spacing: 0.01em;
    margin-bottom: 4px;
    line-height: 1.2;
  }

  .contact-title {
    font-size: 8.5px;
    font-weight: 400;
    color: #b8953a;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  /* ── ACTION BUTTONS ── */
  .actions-grid {
    display: flex;
    flex-direction: column;
    gap: 9px;
    margin-bottom: 20px;
  }

  .action-btn {
    display: flex;
    align-items: center;
    gap: 13px;
    padding: 12px 14px;
    border-radius: 10px;
    border: 0.5px solid #222;
    background: #0f0f0f;
    cursor: pointer;
    text-decoration: none;
    transition: border-color 0.25s, background 0.25s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }

  .action-btn:hover {
    border-color: #b8953a;
    background: #141408;
  }

  .action-btn:active {
    transform: scale(0.982);
  }

  .btn-icon {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .btn-icon svg {
    width: 18px;
    height: 18px;
  }

  .btn-icon.phone  { background: #161610; border: 0.5px solid #2a2a1a; }
  .btn-icon.whatsapp { background: #0b1a10; border: 0.5px solid #1a3325; }
  .btn-icon.email  { background: #10121a; border: 0.5px solid #1a1d30; }
  .btn-icon.nfc    { background: #0d1520; border: 0.5px solid #1a2535; }

  .btn-text {
    display: flex;
    flex-direction: column;
    gap: 2px;
    flex: 1;
    min-width: 0;
  }

  .btn-label {
    font-size: 11.5px;
    font-weight: 500;
    color: #ccc5b5;
    letter-spacing: 0.03em;
  }

  .btn-detail {
    font-size: 10px;
    color: #484848;
    letter-spacing: 0.02em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .btn-arrow {
    flex-shrink: 0;
    transition: color 0.2s, transform 0.2s;
  }

  .action-btn:hover .btn-arrow svg { stroke: #b8953a; }
  .action-btn:hover .btn-arrow { transform: translateX(2px); }

  /* ── FOOTER ── */
  .card-footer {
    border-top: 0.5px solid #171717;
    padding: 13px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .footer-note {
    font-size: 9px;
    color: #383838;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .gold-dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: #b8953a;
    opacity: 0.5;
  }

  .nfc-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: #0d1520;
    border: 0.5px solid #1a2535;
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 8.5px;
    color: #4a9fd4;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .nfc-pulse {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #4a9fd4;
    animation: pulse 2.2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.3; transform: scale(0.65); }
  }
</style>
</head>
<body>

    <div class="card-footer">

</html>
